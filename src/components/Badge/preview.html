<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badge Preview</title>
  <link rel="stylesheet" href="./Badge.css" />
</head>
<body>
  <div>
    <span class="badge" data-type="success">Afgehandeld</span>
  </div>
  <div>
    <span class="badge" data-type="info">Ongelezen</span>
  </div>
  <div>
    <span class="badge" data-type="warning">Warning</span>
  </div>
  <div>
    <span class="badge" data-type="danger">Error</span>
  </div>
</body>
</html>
