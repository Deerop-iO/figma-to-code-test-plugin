      background: #1a1a2e;
      padding: 32px;
      font-family: 'Roboto', sans-serif;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .preview-label {
      color: #bcbdc8;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .preview-col {
      display: flex;
      flex-direction: column;
    }

</head>

        <span class="nav-item-l2__counter">2</span>
      </a>
      <a class="nav-item-l2" data-state="idle" href="#">
