<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Logo Wrapper — Preview</title>
  <link rel="stylesheet" href="./logo-wrapper.css" />
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    .preview-row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
    .preview-label { font-size: 14px; color: #333; min-width: 180px; }
  </style>
</head>
<body>
  <div class="preview-row">
    <span class="preview-label">Openbaar Ministerie</span>
    <div class="logo-wrapper" data-location="message-teaser" data-organisation="openbaar-ministerie">
      <img class="logo-wrapper__image" src="https://placehold.co/31x31?text=OM" alt="Openbaar Ministerie logo" />
    </div>
  </div>

  <div class="preview-row">
    <span class="preview-label">FOD Financien</span>
    <div class="logo-wrapper" data-location="message-teaser" data-organisation="fod-financien">
      <img class="logo-wrapper__image" src="https://placehold.co/50x14?text=FOD" alt="FOD Financien logo" />
    </div>
  </div>

  <div class="preview-row">
    <span class="preview-label">Fedris</span>
    <div class="logo-wrapper" data-location="message-teaser" data-organisation="fedris">
      <img class="logo-wrapper__image" src="https://placehold.co/50x35?text=Fedris" alt="Fedris logo" />
    </div>
  </div>

  <div class="preview-row">
    <span class="preview-label">Stad Antwerpen</span>
    <div class="logo-wrapper" data-location="message-teaser" data-organisation="stad-antwerpen">
      <img class="logo-wrapper__image" src="https://placehold.co/30x30?text=SA" alt="Stad Antwerpen logo" />
    </div>
  </div>
</body>
</html>
