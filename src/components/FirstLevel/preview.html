<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nav Item – First Level – Preview</title>
  <link rel="stylesheet" href="./nav-item.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #1a2233;
      font-family: "Roboto", sans-serif;
    }
    .preview-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 264px;
    }
    .preview-label {
      font-size: 11px;
      color: #888;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="preview-group">
    <span class="preview-label">Idle (with counter)</span>
    <a class="nav-item" href="#" data-state="idle" data-show-counter="true">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>

    <span class="preview-label">Selected (with counter)</span>
    <a class="nav-item" href="#" data-state="selected" aria-current="page" data-show-counter="true">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>

    <span class="preview-label">Hover (with counter)</span>
    <a class="nav-item nav-item--hover" href="#" data-state="hover" data-show-counter="true">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>

    <span class="preview-label">Idle (no counter)</span>
    <a class="nav-item" href="#" data-state="idle" data-show-counter="false">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>

    <span class="preview-label">Selected – as &lt;button&gt;</span>
    <button class="nav-item" type="button" data-state="selected" data-show-counter="true">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </button>
  </div>
</body>
</html>
