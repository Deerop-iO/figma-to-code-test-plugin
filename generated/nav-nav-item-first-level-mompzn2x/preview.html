<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nav Item – First Level – Preview</title>
  <link rel="stylesheet" href="./nav-item.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #1a2233;
      font-family: 'Roboto', sans-serif;
    }
    .preview-group {
      max-width: 264px;
      margin-bottom: 24px;
    }
    .preview-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="preview-group">
    <div class="preview-label">Idle (with icon &amp; counter)</div>
    <a class="nav-item nav-item--show-icon" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="3" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">Selected (with icon &amp; counter)</div>
    <a class="nav-item nav-item--show-icon nav-item--selected" href="#" aria-current="page">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="3" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">Hover (with icon &amp; counter) — forced class</div>
    <a class="nav-item nav-item--show-icon nav-item--hover" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="3" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">Idle – no icon, no counter</div>
    <a class="nav-item nav-item--hide-counter" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="3" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">Button element – Selected (with icon &amp; counter)</div>
    <button class="nav-item nav-item--show-icon nav-item--selected" type="button" aria-current="page">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="3" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="3" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </button>
  </div>

</body>
</html>
