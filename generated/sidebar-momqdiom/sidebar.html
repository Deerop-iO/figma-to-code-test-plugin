<aside class="sidebar" aria-label="Main navigation">
  <!-- Header -->
  <header class="sidebar__header">
    <div class="sidebar__logo">
      <span class="sidebar__logo-my">my</span>
      <span class="sidebar__logo-hub">HUB</span>
    </div>
    <button class="sidebar__search-btn" type="button" aria-label="Search">
      <span class="icon" aria-hidden="true">search</span>
    </button>
  </header>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <!-- Overzicht (selected) -->
    <button type="button"
            class="sidebar__nav-item sidebar__nav-item--selected"
            aria-expanded="false"
            aria-controls="submenu-tasks"
            data-submenu="tasks">
      <span class="sidebar__nav-item-icon"><span class="icon" aria-hidden="true">dashboard</span></span>
      <span class="sidebar__nav-item-label">Overzicht</span>
      <span class="sidebar__nav-item-counter">2</span>
    </button>

    <!-- Berichten -->
    <button type="button"
            class="sidebar__nav-item"
            aria-expanded="false"
            aria-controls="submenu-messages"
            data-submenu="messages">
      <span class="sidebar__nav-item-icon"><span class="icon" aria-hidden="true">mail</span></span>
      <span class="sidebar__nav-item-label">Berichten</span>
      <span class="sidebar__nav-item-counter">1</span>
    </button>

    <!-- Dossiers -->
    <button type="button"
            class="sidebar__nav-item"
            aria-expanded="false"
            aria-controls="submenu-dossiers"
            data-submenu="dossiers">
      <span class="sidebar__nav-item-icon"><span class="icon" aria-hidden="true">e-loket</span></span>
      <span class="sidebar__nav-item-label">Dossiers</span>
      <span class="sidebar__nav-item-counter">1</span>
    </button>

    <!-- Documenten -->
    <button type="button"
            class="sidebar__nav-item"
            aria-expanded="false"
            aria-controls="submenu-documents"
            data-submenu="documents">
      <span class="sidebar__nav-item-icon"><span class="icon" aria-hidden="true">documents</span></span>
      <span class="sidebar__nav-item-label">Documenten</span>
      <span class="sidebar__nav-item-counter">1</span>
    </button>

    <!-- Submenu slots (shown after all nav items per Figma structure) -->
    <div class="sidebar__submenu sidebar__submenu--tasks" id="submenu-tasks" role="region" aria-label="Tasks submenu">
      <!-- Slot: tasks submenu content -->
    </div>

    <div class="sidebar__submenu sidebar__submenu--messages" id="submenu-messages" role="region" aria-label="Messages submenu">
      <!-- Slot: messages submenu content -->
    </div>

    <div class="sidebar__submenu sidebar__submenu--dossiers" id="submenu-dossiers" role="region" aria-label="Dossiers submenu">
      <!-- Slot: dossiers submenu content -->
    </div>

    <div class="sidebar__submenu sidebar__submenu--documents" id="submenu-documents" role="region" aria-label="Documents submenu">
      <!-- Slot: documents submenu content -->
    </div>
  </nav>

  <!-- User Footer -->
  <footer class="sidebar__user">
    <div class="sidebar__user-info">
      <div class="sidebar__user-avatar">
        <span class="icon" aria-hidden="true">user</span>
      </div>
      <span class="sidebar__user-name">Jean Peeters</span>
    </div>
    <button class="sidebar__settings-btn" type="button" aria-label="Settings">
      <span class="icon" aria-hidden="true">settings</span>
    </button>
  </footer>
</aside>
