<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badge — Preview</title>
  <link rel="stylesheet" href="./badge.css" />
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:8px;padding:16px;">
    <div><span class="badge" data-type="success">Afgehandeld</span></div>
    <div><span class="badge" data-type="info">Ongelezen</span></div>
    <div><span class="badge" data-type="warning">Warning</span></div>
    <div><span class="badge" data-type="danger">Error</span></div>
  </div>
</body>
</html>
