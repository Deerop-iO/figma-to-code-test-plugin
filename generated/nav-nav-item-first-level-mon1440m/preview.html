<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nav Item — First Level — Preview</title>
  <link rel="stylesheet" href="./nav-item.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #1a2233;
      font-family: 'Roboto', sans-serif;
    }
    .preview-group { margin-bottom: 24px; }
    .preview-label { color: #8a8a9a; font-size: 12px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="preview-group">
    <div class="preview-label">State: Idle</div>
    <a class="nav-item" data-state="idle" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">State: Selected</div>
    <a class="nav-item" data-state="selected" aria-current="page" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">State: Hover (forced)</div>
    <a class="nav-item" data-state="hover" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">State: Idle — as &lt;button&gt;</div>
    <button class="nav-item" data-state="idle" type="button">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </button>
  </div>

  <div class="preview-group">
    <div class="preview-label">Boolean: Show Counter = false</div>
    <a class="nav-item" data-state="idle" data-show-counter="false" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

  <div class="preview-group">
    <div class="preview-label">Boolean: Show Icon = false</div>
    <a class="nav-item" data-state="selected" data-show-icon="false" href="#">
      <span class="nav-item__indicator" aria-hidden="true"></span>
      <span class="nav-item__icon-label">
        <span class="nav-item__icon" aria-hidden="true">dashboard</span>
        <span class="nav-item__label">Overzicht</span>
      </span>
      <span class="nav-item__counter">2</span>
    </a>
  </div>

</body>
</html>
