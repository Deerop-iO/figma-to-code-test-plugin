<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nav item — preview</title>
    <link rel="stylesheet" href="./nav-item.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #002130;
        font-family: Roboto, system-ui, sans-serif;
      }
      .demo {
        max-width: 296px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .demo__row {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <div class="demo__row">
        <a class="nav-item" href="#" data-state="idle">
          <span class="nav-item__indicator" aria-hidden="true"></span>
          <span class="nav-item__icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" focusable="false">
              <path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z" />
            </svg>
          </span>
          <span class="nav-item__label">Overzicht</span>
          <span class="nav-item__counter">2</span>
        </a>
      </div>

      <div class="demo__row">
        <a class="nav-item" href="#" data-state="selected">
          <span class="nav-item__indicator" aria-hidden="true"></span>
          <span class="nav-item__icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" focusable="false">
              <path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z" />
            </svg>
          </span>
          <span class="nav-item__label">Overzicht</span>
          <span class="nav-item__counter">2</span>
        </a>
      </div>

      <div class="demo__row">
        <a class="nav-item" href="#" data-state="hover">
          <span class="nav-item__indicator" aria-hidden="true"></span>
          <span class="nav-item__icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor" focusable="false">
              <path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z" />
            </svg>
          </span>
          <span class="nav-item__label">Overzicht</span>
          <span class="nav-item__counter">2</span>
        </a>
      </div>
    </div>
  </body>
</html>
