<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Logo Wrapper — Preview</title>
  <link rel="stylesheet" href="./logo-wrapper.css" />
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    .preview-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>
  <h1>Logo Wrapper</h1>
  <div class="preview-row">
    <div class="logo-wrapper" data-location="message-teaser" data-organisation="openbaar-ministerie">
      <img class="logo-wrapper__image" src="logo-openbaar-ministerie.png" alt="Openbaar Ministerie logo" />
    </div>

    <div class="logo-wrapper" data-location="message-teaser" data-organisation="fod-financien">
      <img class="logo-wrapper__image" src="logo-fod-financien.png" alt="FOD Financien logo" />
    </div>

    <div class="logo-wrapper" data-location="message-teaser" data-organisation="fedris">
      <img class="logo-wrapper__image" src="logo-fedris.png" alt="Fedris logo" />
    </div>

    <div class="logo-wrapper" data-location="message-teaser" data-organisation="stad-antwerpen">
      <img class="logo-wrapper__image" src="logo-stad-antwerpen.png" alt="Stad Antwerpen logo" />
    </div>
  </div>
</body>
</html>
